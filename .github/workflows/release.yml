name: Release based on tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g., v0.16.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-x86_64
            install_sbcl: sudo apt-get update && sudo apt-get install -y sbcl make
            run_prefix: ""
          - os: macos-latest
            arch: darwin-arm64
            install_sbcl: brew install sbcl
            run_prefix: ""
          - os: macos-latest
            arch: darwin-x86_64
            install_sbcl: |
              arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
              arch -x86_64 /usr/local/bin/brew install sbcl
            run_prefix: "arch -x86_64"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install SBCL
        run: ${{ matrix.install_sbcl }}

      - name: Install Quicklisp
        run: |
          curl -O https://beta.quicklisp.org/quicklisp.lisp
          ${{ matrix.run_prefix }} sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install)' \
               --eval '(quit)'

      - name: Build binary
        run: ${{ matrix.run_prefix }} make build

      - name: Verify binary
        run: |
          test -f gilt
          chmod +x gilt
          ${{ matrix.run_prefix }} ./gilt --version

      - name: Set tag name
        id: tag
        run: echo "name=${{ inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Package binary
        run: tar -czvf gilt-${{ steps.tag.outputs.name }}-${{ matrix.arch }}.tar.gz gilt

      - name: Upload binary to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ steps.tag.outputs.name }} gilt-${{ steps.tag.outputs.name }}-${{ matrix.arch }}.tar.gz --clobber
